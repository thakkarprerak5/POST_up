<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form { max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
    </style>
</head>
<body>
    <div class="form">
        <h2>Direct Login Test</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" value="admin@example.com" required>
            <input type="password" id="password" placeholder="Password" value="admin123" required>
            <button type="submit">Login</button>
        </form>
        
        <button onclick="checkSession()" style="background: #28a745; margin-top: 10px;">Check Session</button>
        <button onclick="testAuthAPI()" style="background: #ffc107; color: black; margin-top: 10px;">Test Auth API</button>
        
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info result">🔄 Logging in...</div>';
            
            try {
                const response = await fetch('/api/auth/callback/credentials', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        email: email,
                        password: password,
                        csrfToken: await getCSRFToken(),
                        json: 'true'
                    })
                });
                
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success result">✅ Login successful! Check session now.</div>';
                } else {
                    const error = await response.text();
                    resultDiv.innerHTML = `<div class="error result">❌ Login failed: ${error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error result">❌ Login error: ${error.message}</div>`;
            }
        });
        
        async function getCSRFToken() {
            const response = await fetch('/api/auth/csrf');
            const data = await response.json();
            return data.csrfToken;
        }
        
        async function checkSession() {
            try {
                const response = await fetch('/api/auth/session');
                const session = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <div class="info result">
                        <h3>Current Session:</h3>
                        <pre>${JSON.stringify(session, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error result">❌ Session error: ${error.message}</div>`;
            }
        }
        
        async function testAuthAPI() {
            try {
                const response = await fetch('/api/admin/debug-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'} result">
                        <h3>Auth API Test (${response.status}):</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error result">❌ API error: ${error.message}</div>`;
            }
        }
        
        // Auto-check session on load
        window.onload = checkSession;
    </script>
</body>
</html>
